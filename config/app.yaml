application:
  name: Real-Time Shuttle Tracking Platform
  version: 1.0.0
  environment: development

database:
  host: localhost
  port: 5432
  user: your_db_user
  password: your_db_password
  name: shuttle_tracking

redis:
  host: localhost
  port: 6379
  password: your_redis_password

nats:
  url: nats://localhost:4222

geo:
  open_route_service_api_key: your_open_route_service_api_key
  google_geocoding_api_key: your_google_geocoding_api_key

otp:
  expiry_duration: 5m
  max_attempts: 3

trip:
  idle_timeout: 10m
  auto_end_threshold: 15m
  heartbeat_timeout: 5m

logging:
  level: info
  format: json

observability:
  metrics_enabled: true
  tracing_enabled: true

security:
  jwt_secret: your_jwt_secret
  otp_session_bound: true

health:
  liveness_endpoint: /health/live
  readiness_endpoint: /health/ready